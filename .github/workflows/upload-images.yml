name: Sync Images to Cloudinary

on:
  push:
    paths:
      - 'images/**'
      - '.github/scripts/upload-cloudinary.js'
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install cloudinary sharp

      - name: Run Upload Script
        env:
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: node .github/scripts/upload-cloudinary.js

      - name: Commit manifest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/image_manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update image manifest [skip ci]" && git push)
